<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Awais Yarn Waste Broker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-600 to-blue-800 min-h-screen flex items-center justify-center">

<div class="max-w-md w-full mx-4">

    <!-- Heading -->
    <div class="text-center mb-6">
        <h1 class="text-4xl font-bold text-white">Awais Yarn Waste Broker</h1>
        <p class="text-blue-200">Faisalabad</p>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

        <!-- DB STATUS -->
        <div class="p-5">
            {% if db_connected %}
                <div class="bg-green-100 text-green-700 px-4 py-3 rounded-xl text-center font-semibold">
                    Database Connected
                </div>
            {% else %}
                <div class="bg-red-100 text-red-700 px-4 py-3 rounded-xl text-center font-semibold">
                    Database Not Connected
                </div>
            {% endif %}

            <p class="text-center text-sm mt-2 text-gray-500">
                {{ db_message }}
            </p>
        </div>

        <!-- ERROR -->
        {% if error %}
            <div class="bg-red-100 text-red-700 px-5 py-3 mx-5 rounded-xl text-center">
                {{ error }}
            </div>
        {% endif %}

        <!-- FORM -->
        <div class="px-8 py-8">
            <form method="post" class="space-y-5">

                <input type="text" name="username" placeholder="Username"
                       required
                       class="w-full px-4 py-3 border rounded-xl">

                <input type="password" name="password" placeholder="Password"
                       required
                       class="w-full px-4 py-3 border rounded-xl">

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl">
                    Login
                </button>
            </form>
        </div>
    </div>

    <p class="text-center text-white/70 mt-6 text-sm">
        ©Awais Yarn Waste Broker
    </p>

</div>

</body>
</html>
